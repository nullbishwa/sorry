<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 2rem;
            width: 95%;
            max-width: 700px;
            min-height: 550px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .btn:active {
            transform: scale(0.95);
        }

        /* Floating Hearts Animation Background */
        .hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            bottom: -100px;
            color: rgba(255, 255, 255, 0.5);
            animation: floatUp 10s linear infinite;
            font-size: 24px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* Lyrics Styles */
        #lyrics-content {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .lyric-line {
            font-size: 1.6rem; /* Slightly larger for Shayari */
            color: #fff;
            font-weight: 700;
            /* Added a pinkish glow for romance */
            text-shadow: 0 0 10px rgba(236, 72, 153, 0.6), 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 1.5rem;
            opacity: 0; 
            transition: opacity 0.8s ease; 
            min-height: 2em;
        }

        .line-visible {
            opacity: 1;
        }

        .line-hidden {
            opacity: 0;
        }

        /* Typing Cursor */
        .typing::after {
            content: '|';
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #yes-btn {
            transition: font-size 0.2s ease, transform 0.2s ease;
        }
        
        .music-bars {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 30px;
            margin-bottom: 20px;
        }
        
        .bar {
            width: 6px;
            margin: 0 2px;
            background: white;
            animation: equalize 1s infinite;
        }
        
        .bar:nth-child(1) { animation-delay: 0.1s; }
        .bar:nth-child(2) { animation-delay: 0.3s; }
        .bar:nth-child(3) { animation-delay: 0.5s; }
        .bar:nth-child(4) { animation-delay: 0.2s; }
        
        @keyframes equalize {
            0% { height: 5px; }
            50% { height: 30px; }
            100% { height: 5px; }
        }

    </style>
</head>
<body>

    <!-- Background Audio -->
    <audio id="bg-music" preload="auto">
        <source src="./song.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div class="hearts-container" id="hearts-bg"></div>

    <div class="glass-panel" id="main-card">
        
        <!-- Proposal Section -->
        <div id="proposal-content" class="flex flex-col items-center w-full">
            <div class="text-7xl mb-6 text-red-500 drop-shadow-lg">❤️</div>
            <h1 id="main-title" class="text-5xl mb-10">tum mujhe maf karo na betu 🥹</h1>
            
            <div class="flex justify-center gap-8 relative w-full items-center flex-wrap">
                <button id="yes-btn" onclick="acceptProposal()" class="btn bg-white text-pink-600 hover:bg-pink-50 font-bold py-4 px-10 rounded-full shadow-xl text-2xl transform hover:scale-110 ring-4 ring-pink-200">
                    Yes
                </button>
                
                <button id="btn-no" onclick="handleNoClick()" class="btn bg-transparent border-2 border-white text-white hover:bg-white hover:text-pink-500 font-bold py-4 px-10 rounded-full text-2xl">
                    No
                </button>
            </div>
        </div>

        <!-- Lyrics Animation Section (Hidden initially) -->
        <div id="lyrics-content" class="hidden flex flex-col justify-center items-center">
            
            <!-- Intro Shayari Message -->
            <div class="text-white text-xl italic font-medium mb-8 max-w-lg leading-relaxed drop-shadow-md px-4 text-pink-100">
                "Kuch rishte anjane mein ban jate hain,<br>
                Pehle dil... phir zindagi ban jate hain ❤️"
            </div>

            <!-- Visualizer Bars -->
            <div class="music-bars mb-8 opacity-80">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>

            <div id="line1" class="lyric-line"></div>
            <div id="line2" class="lyric-line"></div>
        </div>

    </div>

    <script>
        // --- Configuration ---
        const audio = document.getElementById('bg-music');
        
        // Song start time for verse
        const START_TIME = 51.5; 
        
        // Typing speed (50ms is good speed)
        const TYPE_SPEED = 50; 

        // Updated with Romantic Shayari
        const lyricsData = [
            { text: "Meri har khushi, har baat teri hai", time: 53.0, lineId: 1 },
            { text: "Saanson mein chhupi ye hayaat teri hai", time: 56.5, lineId: 2, clearAfter: true },
            
            { text: "Do pal bhi nahi reh sakte tumhare bin", time: 60.5, lineId: 1 },
            { text: "Har dhadkan, har saans, har jazbaat teri hai", time: 64.5, lineId: 2, clearAfter: true },
            
            { text: "Tumhe maanga hai maine har dua mein", time: 69.0, lineId: 1 },
            { text: "Basaa lu tujhe apni har wafa mein", time: 73.0, lineId: 2, clearAfter: true },
            
            { text: "Sirf chahne se koi apna nahi hota", time: 76.5, lineId: 1 },
            { text: "Aur tumse haseen koi sapna nahi hota", time: 80.5, lineId: 2, clearAfter: true },
            
            { text: "Tera saath hi toh hai zindagi meri", time: 85.0, lineId: 1 },
            { text: "Tere bina ye duniya kuch bhi nahi meri", time: 89.5, lineId: 2, clearAfter: true },
            
            { text: "Bas tera haath thame rakhna hai", time: 94.0, lineId: 1 },
            { text: "Zindagi bhar tujhe apna kehna hai...", time: 98.0, lineId: 2, clearAfter: false }
        ];

        const rejectionMessages = [
            "Please na jan 🥺", "Man jao na babu... 💖", "Soch lo ache se... 💭",
            "Ek bar aur soch lo... 🌸", "Aise mat karo na 😢", "Dil todogi kya mera? 💔",
            "Please say Yes! 💍", "Mai ro dunga... 😭", "Kitna bhav khaogi? 😐",
            "Last chance de raha hu! 😤", "Maan bhi jao ab! 🥰"
        ];
        
        let messageIndex = 0;
        let currentLyricIndex = 0;
        let clearTimer = null; 

        // --- Interaction Logic ---

        function handleNoClick() {
            const title = document.getElementById('main-title');
            const yesBtn = document.getElementById('yes-btn');
            
            title.innerText = rejectionMessages[messageIndex];
            messageIndex = (messageIndex + 1) % rejectionMessages.length;

            const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = (currentSize * 1.15) + 'px';
        }

        function acceptProposal() {
            document.getElementById('proposal-content').classList.add('hidden');
            document.getElementById('lyrics-content').classList.remove('hidden');
            document.getElementById('lyrics-content').classList.add('flex'); 

            audio.currentTime = START_TIME; 
            audio.play().then(() => {
                requestAnimationFrame(syncLyrics);
            }).catch(e => {
                console.log("Playback failed:", e);
                document.body.addEventListener('click', () => {
                    audio.play();
                    requestAnimationFrame(syncLyrics);
                }, { once: true });
            });
        }

        // --- Lyric Sync Engine ---

        function syncLyrics() {
            const currentTime = audio.currentTime;
            
            if (currentLyricIndex < lyricsData.length) {
                const nextLyric = lyricsData[currentLyricIndex];
                
                if (currentTime >= nextLyric.time) {
                    displayLyric(nextLyric);
                    currentLyricIndex++;
                }
            }
            
            requestAnimationFrame(syncLyrics);
        }

        async function displayLyric(lyricObj) {
            // Reset any pending clears from previous lines to prevent early fading
            if (clearTimer) {
                clearTimeout(clearTimer);
                clearTimer = null;
            }

            const elId = lyricObj.lineId === 1 ? 'line1' : 'line2';
            const el = document.getElementById(elId);
            
            // Reset for typing
            el.className = "lyric-line typing";
            el.innerText = ""; 
            el.classList.add('line-visible');
            
            // --- Handle Clearing Logic (Calculated BEFORE typing) ---
            if (lyricObj.clearAfter) {
                const currentIdx = lyricsData.indexOf(lyricObj);
                const nextItem = lyricsData[currentIdx + 1];
                
                if (nextItem) {
                    // Calculate exact time until next line starts relative to current lyric start
                    // We want to clear just 500ms before the next line triggers
                    const durationUntilNext = (nextItem.time - lyricObj.time) * 1000;
                    const clearDelay = Math.max(1000, durationUntilNext - 500);
                    
                    clearTimer = setTimeout(() => {
                         const line1 = document.getElementById('line1');
                         const line2 = document.getElementById('line2');
                         line1.classList.remove('line-visible');
                         line1.classList.add('line-hidden');
                         line2.classList.remove('line-visible');
                         line2.classList.add('line-hidden');
                    }, clearDelay); 
                }
            }

            // --- Typing Animation ---
            await typeText(el, lyricObj.text, TYPE_SPEED); 
            el.classList.remove('typing');
        }

        function typeText(element, text, speed) {
            return new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i);
                        i++;
                        setTimeout(type, speed);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }

        function createHearts() {
            const container = document.getElementById('hearts-bg');
            const heartCount = 25;

            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = ['❤️', '💖', '💕', '🌸'][Math.floor(Math.random() * 4)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 5 + 6) + 's';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                heart.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(heart);
            }
        }

        createHearts();
    </script>
</body>
</html>
